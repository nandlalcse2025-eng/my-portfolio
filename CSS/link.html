<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>psuedo selectors and more desining</title>
    <style>
        .container{
            border: 2px solid red;
            background-color: aqua;
            padding: 34px;
            margin: 34px auto;
            width: 666px;

        }
        a{
            text-decoration:none;
            color: black;
        }
        a:hover{
            color: blue;
            background-color: chartreuse;
        }
        a:visited{
            color: rgb(169, 169, 169);
        }
        a:active{
            color: brown;
        }
        .btn{
            background-color: rgb(151, 165, 42);
            cursor: pointer;
            font-size:13px ;
            border-radius: 10px;
        }
    </style>
</head>
