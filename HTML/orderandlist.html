<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>order and Lists</title>
</head>
<body>
    <u1 style ="list-style-type: circle;">
        <li>this is my first list </li>
        <li>this is my second list</li>
        <li>this is my third list</li>
    </u1>
    <o1 type="a">
        <li>this is my first list </li>
        <li>this is my second list</li>
        <li>this is my third list</li>
    </ol>
    <!--Tables-->
    <h3>HTML table</h3>
    <table>
        <thead>
        <tr>
            <th>Name</th>
            <th>Employee Id</th>
            <th>Employee Role</th>
        </tr>
        </thead>
        <tbody>
            <tr>
                <td>Nandlal</td>
                <td>2025</td>
                <td>programmer</td>
            </tr>
            <tr>
                <td>kumar</td>
                <td>2026</td>
                <td>devoleper</td>
            </tr>
            <tr>
                <td>mishra</td>
                <td>2027</td>
                <td>cyber security</td>
            </tr>
        </tbody>
    </table>
    
</body>
</html>
