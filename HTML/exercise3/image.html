<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Link Example</title>
</head>
<body>
    <h2>Click the image to visit Google</h2>
    
    <!-- Image wrapped inside anchor tag -->
    <a href="https://www.google.com" target="_blank">
        <img src="google-logo.png" alt="Google Logo" width="200">
    </a>
</body>
</html>
