
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Embedded Video Example</title>
</head>
<body>
  <header>
    <h1>My Video Page</h1>
  </header>

  <main>
    <section>
      <h2>Watch This Video</h2>
      <video width="640" height="360" controls autoplay loop preload="metadata">
        <source src="nand.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
      <p>This video demonstrates how to embed media directly into an HTML page.</p>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 My HTML Practice</p>
  </footer>
</body>
</html>
