<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vacation Booking Form</title>
</head>
<body>
  <h1>Book Your Dream Vacation</h1>
  <form action="/submit-booking" method="post">
    <label for="name">Full Name:</label>
    <input type="text" id="name" name="name" required><br><br>

    <label for="email">Email Address:</label>
    <input type="email" id="email" name="email" required><br><br>

    <label for="destination">Destination:</label>
    <select id="destination" name="destination">
      <option value="paris">Paris</option>
      <option value="bali">Bali</option>
      <option value="newyork">New York</option>
      <option value="tokyo">Tokyo</option>
    </select><br><br>

    <label for="start">Start Date:</label>
    <input type="date" id="start" name="start"><br><br>

    <label for="end">End Date:</label>
    <input type="date" id="end" name="end"><br><br>

    <label for="travelers">Number of Travelers:</label>
    <input type="number" id="travelers" name="travelers" min="1"><br><br>

    <p>Travel Class:</p>
    <input type="radio" id="economy" name="class" value="economy" checked>
    <label for="economy">Economy</label>
    <input type="radio" id="business" name="class" value="business">
    <label for="business">Business</label><br><br>

    <label for="requests">Special Requests:</label><br>
    <textarea id="requests" name="requests" rows="4" cols="40"></textarea><br><br>

    <input type="submit" value="Book Vacation">
  </form>
</body>
</html>
