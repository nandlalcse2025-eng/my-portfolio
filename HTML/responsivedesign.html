<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>responsive design</title>
    <style>
        /* CSS for responsive design */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header, .content, .footer {
            background-color: #f4f4f4;
            padding: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 500px) {
            .header, .content {
                padding: 10px;
                margin-bottom: 10px;
                background-color: blue;
            }
        }
        </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Responsive Design Example</h1>
        </div>
        <div class="content">
            <p>This is an example of a responsive design. Resize the browser window to see how the layout adjusts to different screen sizes.</p>
        </div>
        <div class="footer">
            <p>&copy;  Responsive Design Example</p>
        </div>
    </div>
    
</body>
</html>
