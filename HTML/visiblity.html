<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>visivility</title>
    <style>
        .box{
            width: 100px;
            height: 100px;
            background-color: red;
            margin: 0px;
            border: 2px solid black;
        }
        #box2{
            visibility: visible; /* #box2 will be visible but it will take up space in the layout even if it's not visible */
            position: relative; /* #box2 will be positioned relative to its normal position */
            top: 20px;
            z-index:1 ;/* #box2 will be on top of #box1 because it has a higher z-index value */
        }
        #box3{
            display: none; /* #box3 will not be visible and it will not take up space in the layout */
        position: relative;  
        top: 20px;
        }
        </style>
</head>
<body>
    <div class="box" id="box1"></div>
    <div class="box" id="box2"></div>
    <div class="box" id="box3"></div>
    <div class="box" id="box4"></div>


    
</body>
</html>
